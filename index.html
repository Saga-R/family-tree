<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="familyData.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f5f2;
      --bg-2: #ecebe6;
      --ink: #15171a;
      --ink-2: #4a4d54;
      --ink-3: #8a8d94;
      --line: #e3e1da;
      --card: #ffffff;
      --accent: #2f5d4f;       /* deep sage */
      --accent-2: #c47a3d;     /* warm terracotta */
      --male: #3b6fb5;
      --female: #b53b72;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      overflow: hidden;
      width: 100vw; height: 100vh;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* — Header —————————————————————————————————————— */
    .tree-header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 14px; padding: 0 22px;
      z-index: 100;
      border-bottom: 1px solid var(--line);
    }

    .tree-header h1 {
      font-family: 'Fraunces', Georgia, serif;
      color: var(--ink);
      font-size: 20px; font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
    }
    .tree-header h1 .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(47,93,79,0.12);
    }

    /* — Search —————————————————————————————————————— */
    .search-input {
      width: 100%; padding: 9px 14px 9px 36px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg);
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--ink); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .search-input::placeholder { color: var(--ink-3); }
    .search-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(47,93,79,0.12);
    }

    .search-wrap { position: relative; flex: 1; max-width: 320px; }
    .search-wrap::before {
      content: ''; position: absolute; left: 12px; top: 50%;
      width: 14px; height: 14px; transform: translateY(-50%);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238a8d94' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
      background-repeat: no-repeat;
      pointer-events: none;
    }

    /* — Buttons —————————————————————————————————————— */
    .btn {
      padding: 9px 16px;
      border: 1px solid var(--ink);
      border-radius: 10px;
      background: var(--ink);
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
      letter-spacing: -0.005em;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: #2a2c30; }
    .btn:active { transform: translateY(0.5px); }

    .btn-ghost {
      background: transparent;
      border-color: var(--line);
      color: var(--ink-2);
    }
    .btn-ghost:hover {
      background: var(--bg-2);
      border-color: var(--ink-3);
      color: var(--ink);
    }

    /* — Zoom controls ——————————————————————————————— */
    .zoom-controls {
      display: flex; align-items: center;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 10px; overflow: hidden;
    }
    .zoom-btn {
      padding: 7px 12px; background: none; border: none;
      color: var(--ink-2); font-size: 14px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-weight: 500;
      transition: background 0.12s, color 0.12s;
      border-right: 1px solid var(--line);
      min-width: 36px;
    }
    .zoom-btn:last-child { border-right: none; }
    .zoom-btn:hover { background: #fff; color: var(--ink); }

    /* — Canvas —————————————————————————————————————— */
    .canvas-wrap {
      position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
    }

    /* — Detail Panel ————————————————————————————————— */
    .detail-panel {
      position: fixed; top: 64px; right: 0; bottom: 0;
      width: 320px;
      background: #fff;
      border-left: 1px solid var(--line);
      padding: 26px 22px;
      overflow-y: auto; z-index: 90;
      box-shadow: -10px 0 40px rgba(20,20,20,0.06);
    }

    .close-btn {
      position: absolute; top: 18px; right: 18px;
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--line);
      font-size: 14px; color: var(--ink-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .close-btn:hover { background: var(--bg-2); color: var(--ink); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 500;
      background: var(--bg);
      color: var(--ink-2);
      border: 1px solid var(--line);
    }
    .badge.badge-male { background: #eaf1fb; color: #2c5a93; border-color: #d4e4f7; }
    .badge.badge-female { background: #fbeaf0; color: #93305e; border-color: #f5d4e1; }

    .detail-row {
      display: flex; gap: 10px; align-items: baseline;
      font-size: 13px; margin-bottom: 8px; color: var(--ink);
    }
    .detail-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ink-3); min-width: 50px; font-weight: 500;
    }

    .rel-section { margin-bottom: 16px; }
    .rel-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ink-3); margin-bottom: 6px; font-weight: 500;
    }

    /* — Modal ————————————————————————————————————— */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20,22,25,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(6px);
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px; padding: 28px;
      width: 480px; max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--ink-3); margin-bottom: 6px; font-weight: 500;
    }
    .form-input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--ink); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .form-input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(47,93,79,0.12);
    }

    /* — Legend ————————————————————————————————————— */
    .legend {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 12px; padding: 14px 16px;
      font-size: 12px; color: var(--ink-2);
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(20,20,20,0.06);
      backdrop-filter: blur(8px);
    }

    .footer-pill {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 14px;
      font-size: 12px; color: var(--ink-2);
      box-shadow: 0 4px 20px rgba(20,20,20,0.06);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 8px;
    }
    .footer-pill .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-3); }

    /* — Scrollbar ——————————————————————————————————— */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d6d4cd; border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: #b6b4ad; background-clip: content-box; border: 2px solid transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="FamilyTreeApp.jsx"></script>
</body>
</html>
